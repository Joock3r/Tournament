<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchday — Tournament Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;700;800&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* =========================================================
   DESIGN TOKENS
   Theme: "Matchday scoreboard" — pitch-night dark by default,
   amber scoreboard-lamp accent, split-flap signature motif.
   ========================================================= */
:root{
  --bg:#0e1512; --surface:#16211c; --surface-2:#1d2a23; --surface-3:#233229;
  --border:rgba(237,239,234,.09); --border-strong:rgba(237,239,234,.18);
  --text:#edefea; --text-dim:#9aa69e; --text-faint:#6b7870;
  --amber:#ffb020; --amber-dim:#8a611c; --green:#4c9a6a; --green-dim:#2c4636;
  --red:#e2564f; --red-dim:#4a2723; --blue:#5b8fd6;
  --radius:10px; --radius-lg:16px;
  --font-en:'Manrope',sans-serif; --font-he:'Heebo',sans-serif; --font-mono:'Space Mono',monospace;
  --shadow: 0 8px 24px rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#eef1ec; --surface:#ffffff; --surface-2:#f5f7f3; --surface-3:#e9ede6;
  --border:rgba(16,32,26,.1); --border-strong:rgba(16,32,26,.2);
  --text:#0f1c16; --text-dim:#4d5b53; --text-faint:#7c8a82;
  --amber-dim:#ffe2ad; --green-dim:#cfe6da; --red-dim:#f6d3d1;
  --shadow: 0 8px 24px rgba(16,32,26,.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--text); font-family:var(--font-en); transition:background .25s,color .25s;}
html[dir="rtl"] body{font-family:var(--font-he);}
.mono{font-family:var(--font-mono);}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit;}

/* ---------- App shell ---------- */
.app-header{
  position:sticky; top:0; z-index:50; background:var(--bg);
  border-bottom:1px solid var(--border); backdrop-filter:blur(6px);
}
.header-top{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; gap:8px;}
.brand{display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-weight:700; font-size:19px; letter-spacing:.5px; flex-shrink:0; white-space:nowrap;}
.brand .dot{width:9px; height:9px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber); flex-shrink:0;}
.header-controls{display:flex; align-items:center; gap:6px; min-width:0;}
.icon-btn{
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:7px 10px; font-size:13px; font-weight:600; flex-shrink:0; white-space:nowrap;
}
.icon-btn:hover{border-color:var(--border-strong);}
#gsi-btn-wrap{display:flex; align-items:center; min-width:0;}
.user-chip{display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 10px 4px 4px; min-width:0;}
html[dir="rtl"] .user-chip{padding:4px 4px 4px 10px;}
.user-chip img{width:24px; height:24px; border-radius:50%; flex-shrink:0;}
.user-chip .name{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:90px;}
.user-chip .signout{font-size:15px; line-height:1; color:var(--text-faint); flex-shrink:0; padding:2px; cursor:pointer;}
@media(max-width:480px){
  .header-top{padding:10px 12px; gap:4px;}
  .brand{font-size:15px; gap:5px;}
  .brand .dot{width:7px; height:7px;}
  .header-controls{gap:4px;}
  .icon-btn{padding:6px 8px; font-size:11.5px;}
  .user-chip .name{max-width:46px; font-size:12px;}
  .user-chip{gap:4px; padding:3px 8px 3px 3px;}
  html[dir="rtl"] .user-chip{padding:3px 3px 3px 8px;}
  .user-chip img{width:20px; height:20px;}
}

.tabs{display:flex; gap:2px; padding:0 16px; overflow-x:auto; scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  background:none; border:none; color:var(--text-dim); font-weight:700; font-size:13.5px;
  padding:12px 16px; border-bottom:2px solid transparent; white-space:nowrap; letter-spacing:.2px;
}
.tab-btn.active{color:var(--amber); border-bottom-color:var(--amber);}
.tab-btn:hover:not(.active){color:var(--text);}

main{max-width:1080px; margin:0 auto; padding:24px 16px 80px;}
.view{display:none; animation:fadeIn .3s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:16px;}
.card-title{font-family:var(--font-mono); font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--text-faint); margin-bottom:14px;}
.section-title{font-size:22px; font-weight:800; margin-bottom:4px;}
.section-sub{color:var(--text-dim); font-size:14px; margin-bottom:20px;}

/* ---------- Split-flap signature element ---------- */
.flap-board{display:flex; gap:6px; flex-wrap:wrap; align-items:center; direction:ltr;}
.flap-group{display:flex; flex-direction:column; align-items:center; gap:6px;}
.flap-label{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-faint); font-weight:700;}
.flap-char{
  width:34px; height:44px; background:#10231a; border-radius:4px; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700;
  font-size:24px; color:var(--amber); box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}
.flap-char::after{content:""; position:absolute; left:0; right:0; top:50%; height:1px; background:rgba(0,0,0,.5);}
.flap-char.flip{animation:flip .35s ease;}
@keyframes flip{0%{transform:rotateX(0);} 50%{transform:rotateX(90deg); opacity:.4;} 100%{transform:rotateX(0); opacity:1;}}

/* ---------- Leaderboard ---------- */
.leaderboard{width:100%; border-collapse:collapse;}
.leaderboard th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--text-faint); padding:8px 10px; border-bottom:1px solid var(--border); font-weight:700;}
html[dir="rtl"] .leaderboard th{text-align:right;}
.leaderboard td{padding:12px 10px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle;}
.leaderboard tr:hover td{background:var(--surface-2);}
.rank-cell{font-family:var(--font-mono); font-weight:700; width:36px; color:var(--text-dim); direction:ltr;}
.rank-cell.top1{color:var(--amber);} .rank-cell.top2{color:#c9c9c9;} .rank-cell.top3{color:#c88a4d;}
.points-cell{font-family:var(--font-mono); font-weight:700; font-size:16px; color:var(--amber); text-align:right; direction:ltr;}
html[dir="rtl"] .points-cell{text-align:left;}
.form-dots{display:flex; gap:4px;}
.form-dot{width:9px; height:9px; border-radius:50%;}
.form-dot.W{background:var(--green);} .form-dot.D{background:var(--text-faint);} .form-dot.L{background:var(--red);}
.player-name-cell{display:flex; align-items:center; gap:10px; font-weight:600;}
.avatar{width:28px; height:28px; border-radius:50%; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text-dim);}

/* ---------- Rules ---------- */
.rules-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media(max-width:720px){.rules-grid{grid-template-columns:1fr;}}
.rule-table{width:100%; border-collapse:collapse; font-size:13.5px;}
.rule-table td{padding:7px 4px; border-bottom:1px solid var(--border);}
.rule-table td:last-child{text-align:right; direction:ltr;}
html[dir="rtl"] .rule-table td:last-child{text-align:left;}
.rule-value{display:inline-block; min-width:30px; text-align:center; background:var(--surface-3); color:var(--amber); font-weight:700; font-family:var(--font-mono); font-size:13px; padding:3px 9px; border-radius:6px;}
.rule-value.negative{color:var(--red);}
.rule-table .pos-tag{display:inline-block; font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; background:var(--surface-3); margin-inline-end:6px;}
.badge-pos-GK{color:var(--blue);} .badge-pos-DF{color:var(--green);} .badge-pos-CM{color:var(--amber);} .badge-pos-ST{color:var(--red);}

/* ---------- Forms ---------- */
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.4px;}
.field select, .field input[type=number], .field input[type=text]{
  width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:14px;
}
.field select:focus, .field input:focus{outline:2px solid var(--amber); outline-offset:1px;}
.podium-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
@media(max-width:640px){.podium-grid{grid-template-columns:1fr 1fr;}}
.group-editor{background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px;}
.group-editor h4{font-family:var(--font-mono); font-size:12px; color:var(--text-faint); margin-bottom:8px; text-transform:uppercase;}
.drag-list{list-style:none; display:flex; flex-direction:column; gap:6px;}
.drag-item{
  background:var(--surface-3); border:1px solid var(--border); border-radius:8px; padding:9px 12px;
  display:flex; align-items:center; gap:10px; font-size:13.5px; font-weight:600; cursor:grab;
}
.drag-item.dragging{opacity:.4;}
.drag-handle{color:var(--text-faint); font-size:14px;}
.drag-pos{font-family:var(--font-mono); font-weight:700; color:var(--amber); width:16px; direction:ltr;}
.btn{
  background:var(--amber); color:#1a1408; border:none; padding:11px 22px; border-radius:8px; font-weight:800;
  font-size:14px; letter-spacing:.3px;
}
.btn:hover{filter:brightness(1.08);}
.btn:disabled{background:var(--surface-3); color:var(--text-faint); cursor:not-allowed;}
.btn-ghost{background:transparent; border:1px solid var(--border-strong); color:var(--text);}
.lock-banner{background:var(--red-dim); border:1px solid var(--red); color:var(--text); padding:10px 14px; border-radius:8px; font-size:13.5px; margin-bottom:16px; display:flex; align-items:center; gap:8px;}
.saved-banner{background:var(--green-dim); border:1px solid var(--green); color:var(--text); padding:10px 14px; border-radius:8px; font-size:13.5px; margin-bottom:16px;}

/* ---------- Games ---------- */
.game-card{border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-bottom:12px; background:var(--surface);}
.game-meta{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.4px;}
.game-teams{display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:14px;}
.team-name{font-weight:800; font-size:15px; flex:1; text-align:center;}
.score-inputs{display:flex; align-items:center; gap:10px; direction:ltr;}
.score-inputs input{width:52px; text-align:center; font-family:var(--font-mono); font-size:20px; font-weight:700; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 4px; color:var(--amber);}
.score-sep{font-family:var(--font-mono); font-weight:700; color:var(--text-faint);}
.status-pill{font-size:10px; font-weight:800; padding:3px 8px; border-radius:20px; text-transform:uppercase;}
.status-scheduled{background:var(--surface-3); color:var(--text-dim);}
.status-locked{background:var(--red-dim); color:var(--red);}
.status-final{background:var(--green-dim); color:var(--green);}
.points-pill{font-family:var(--font-mono); font-weight:700; background:var(--amber-dim); color:var(--amber); padding:3px 10px; border-radius:20px; font-size:12px;}

/* ---------- Stats ---------- */
canvas{width:100%; height:280px; display:block;}
.legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim);}
.legend-swatch{width:10px; height:10px; border-radius:3px;}

/* ---------- Hall of fame ---------- */
.hof-item{display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid var(--border);}
.hof-year{font-family:var(--font-mono); font-weight:700; font-size:20px; color:var(--amber); width:64px; direction:ltr;}
.hof-trophy{font-size:22px;}
.hof-name{font-weight:800; font-size:15px;}
.hof-sub{font-size:12.5px; color:var(--text-dim);}

.empty-state{text-align:center; padding:40px 20px; color:var(--text-faint);}
.spinner{width:22px; height:22px; border-radius:50%; border:2px solid var(--border-strong); border-top-color:var(--amber); animation:spin .7s linear infinite; margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.demo-note{font-size:11.5px; color:var(--text-faint); text-align:center; padding:10px; border-top:1px dashed var(--border); margin-top:10px;}

.md-toast{
  position:fixed; top:16px; left:50%; transform:translate(-50%,-140%);
  background:var(--green); color:#0b1a10; font-weight:800; font-size:14px;
  padding:13px 22px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.35);
  z-index:200; display:flex; align-items:center; gap:8px; max-width:90vw; text-align:center;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s; opacity:0;
}
.md-toast.error{background:var(--red); color:#2a0d0b;}
.md-toast.show{transform:translate(-50%,0); opacity:1;}
.player-pts-red{background:var(--red-dim); color:var(--red);}
.player-pts-yellow{background:var(--amber-dim); color:var(--amber);}
.player-pts-green{background:var(--green-dim); color:var(--green);}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="brand"><span class="dot"></span><span data-i18n="brandName">MATCHDAY</span></div>
    <div class="header-controls">
      <button class="icon-btn" id="langToggle">EN</button>
      <button class="icon-btn" id="themeToggle">🌙</button>
      <div id="gsi-btn-wrap"></div>
    </div>
  </div>
  <nav class="tabs" id="tabNav"></nav>
</header>

<main id="main"></main>

<script>
/* =========================================================
   ============  1. CONFIG  — edit per tournament  ==========
   =========================================================
   Fill this in once per tournament. Team lists, rosters and
   scoring rules live here in code (per your choice). Games,
   bets and results live in the Google Sheet below.
*/
const CONFIG = {
  // --- Apps Script Web App URL: the ONLY way this site talks to the Sheet.
  // The Sheet itself should be fully private (no "anyone with the link") —
  // the script runs as its owner and decides what each caller may see.
  // See SETUP.md. ---
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzg9u__7JX1Tw-oodrqohyXP_h5jjFueewGKixkwZnz9rtAIP6rugOP376VuPYiunDb/exec',

  // --- General predictions form closes automatically at this time ---
  GENERAL_DEADLINE: '2028-06-09T00:00:00+03:00',

  // --- Teams: a stable ID (used everywhere in the Sheet) + display name per language.
  //     The Sheet, all bets, and all matching logic use the ID only — never the
  //     display text — so switching language never breaks a saved prediction. ---
  TEAMS: {
    germany: { en:'Germany', he:'גרמניה' }, france: { en:'France', he:'צרפת' },
    england: { en:'England', he:'אנגליה' }, spain: { en:'Spain', he:'ספרד' },
    italy: { en:'Italy', he:'איטליה' }, portugal: { en:'Portugal', he:'פורטוגל' },
    netherlands: { en:'Netherlands', he:'הולנד' }, belgium: { en:'Belgium', he:'בלגיה' },
    croatia: { en:'Croatia', he:'קרואטיה' }, switzerland: { en:'Switzerland', he:'שוויץ' },
    denmark: { en:'Denmark', he:'דנמרק' }, austria: { en:'Austria', he:'אוסטריה' },
    turkey: { en:'Turkey', he:'טורקיה' }, ukraine: { en:'Ukraine', he:'אוקראינה' },
    scotland: { en:'Scotland', he:'סקוטלנד' }, hungary: { en:'Hungary', he:'הונגריה' },
    serbia: { en:'Serbia', he:'סרביה' }, poland: { en:'Poland', he:'פולין' },
    czech: { en:'Czech', he:"צ'כיה" }, romania: { en:'Romania', he:'רומניה' },
    slovakia: { en:'Slovakia', he:'סלובקיה' }, slovenia: { en:'Slovenia', he:'סלובניה' },
    georgia: { en:'Georgia', he:'גאורגיה' }, albania: { en:'Albania', he:'אלבניה' },
  },

  // --- Groups & teams (inserted once per tournament) — lists of TEAM IDs ---
  // NOTE: "turkey" currently appears in BOTH group B and group F below, and
  // "ukraine" doesn't appear in any group — that's almost certainly a mix-up
  // (a team can't play in two groups). Double-check this against your real
  // draw before opening bets; I left the values exactly as you sent them.
  GROUPS: {
    A: ['germany', 'france', 'england', 'spain'],
    B: ['italy', 'croatia', 'albania', 'Ukraine'],
    C: ['portugal', 'switzerland', 'scotland', 'czech'],
    D: ['netherlands', 'denmark', 'hungary', 'romania'],
    E: ['georgia', 'austria', 'serbia', 'slovakia'],
    F: ['belgium', 'turkey', 'poland', 'slovenia'],
  },

  // --- Rosters: teamId -> [{id, en, he, pos}], pos in GK/DF/CM/ST.
  //     `id` must be unique across the whole tournament (used in GameEvents / bets).
  //     Placeholder player names below — replace en/he with your real squads;
  //     the ids (e.g. "germany_gk1") are already unique per team, keep them
  //     as-is (or rename consistently) so bets and events keep matching. ---

      {id:'germany_gk1', en:'Goalkeeper (fill in real name)', he:'שוער (למלא שם אמיתי)', pos:'GK'},
      {id:'germany_df1', en:'Defender (fill in real name)', he:'מגן (למלא שם אמיתי)', pos:'DF'},

      {id:'france_df1', en:'Defender (fill in real name)', he:'מגן (למלא שם אמיתי)', pos:'DF'},
      {id:'france_cm1', en:'Midfielder (fill in real name)', he:'קשר (למלא שם אמיתי)', pos:'CM'},
      {id:'france_st1', en:'Striker (fill in real name)', he:'חלוץ (למלא שם אמיתי)', pos:'ST'},
    ],
    england: [
      {id:'england_gk1', en:'Goalkeeper (fill in real name)', he:'שוער (למלא שם אמיתי)', pos:'GK'},
      {id:'england_df1', en:'Defender (fill in real name)', he:'מגן (למלא שם אמיתי)', pos:'DF'},
      {id:'england_cm1', en:'Midfielder (fill in real name)', he:'קשר (למלא שם אמיתי)', pos:'CM'},
      {id:'england_st1', en:'Striker (fill in real name)', he:'חלוץ (למלא שם אמיתי)', pos:'ST'},
    ],
    spain: [
      {id:'spain_gk1', en:'Goalkeeper (fill in real name)', he:'שוער (למלא שם אמיתי)', pos:'GK'},
      {id:'spain_df1', en:'Defender (fill in real name)', he:'מגן (למלא שם אמיתי)', pos:'DF'},
      {id:'spain_cm1', en:'Midfielder (fill in real name)', he:'קשר (למלא שם אמיתי)', pos:'CM'},
      {id:'spain_st1', en:'Striker (fill in real name)', he:'חלוץ (למלא שם אמיתי)', pos:'ST'},
    ],

      {id:'italy_gk1', en:'Goalkeeper (fill in real name)', he:'שוער (למלא שם אמיתי)', pos:'GK'},

      {id:'italy_cm1', en:'Midfielder (fill in real name)', he:'קשר (למלא שם אמיתי)', pos:'CM'},
      {id:'italy_st1', en:'Striker (fill in real name)', he:'חלוץ (למלא שם אמיתי)', pos:'ST'},
    ],
    portugal: [
      {id:'portugal_gk1', en:'Goalkeeper (fill in real name)', he:'שוער (למלא שם אמיתי)', pos:'GK'},
      {id:'portugal_df1', en:'Defender (fill in real name)', he:'מגן (למלא שם אמיתי)', pos:'DF'},
      {id:'portugal_cm1', en:'Midfielder (fill in real name)', he:'קשר (למלא שם אמיתי)', pos:'CM'},
      {id:'portugal_st1', en:'Striker (fill in real name)', he:'חלוץ (למלא שם אמיתי)', pos:'ST'},
    ],
    netherlands: [

function t(key,...args){ const v = I18N[LANG][key]; return typeof v==='function' ? v(...args) : v; }

/* =========================================================
   ============  2b. Bilingual display-name helpers  =========
   Everything stored in the Sheet (teams, players, results) is
   an ID or an explicit _en/_he pair — never plain display text —
   so the whole site re-renders correctly in either language
   without touching stored data.
   ========================================================= */
function teamName(teamId){
  const t = CONFIG.TEAMS[teamId];
  return t ? (t[LANG] || t.en || teamId) : teamId;
}
function allPlayersFlat(){
  return Object.entries(CONFIG.ROSTERS).flatMap(([teamId, squad]) => squad.map(p => ({...p, teamId})));
}
function findPlayer(playerId){ return allPlayersFlat().find(p => p.id === playerId) || null; }
function playerName(playerIdOrObj){
  const p = typeof playerIdOrObj === 'object' ? playerIdOrObj : findPlayer(playerIdOrObj);
  if(!p) return playerIdOrObj;
  return p[LANG] || p.en || p.id;
}
/** Participant display name — Sheet stores name_en/name_he columns per person
 *  (filled in once by whoever manages the tournament); falls back gracefully
 *  if only one language was filled in. */
function participantName(p){
  return p['name_'+LANG] || p.name_en || p.name_he || p.name || p.email;
}

const STATE = { user:null, participants:[], games:[], gameBets:[], generalBets:[], hof:[], gameEvents:[], groupResults:[], demo:false, loaded:false };

async function fetchTab(tabName){
  const email = STATE.user ? STATE.user.email : '';
  const url = `${CONFIG.APPS_SCRIPT_URL}?tab=${encodeURIComponent(tabName)}&email=${encodeURIComponent(email)}`;
  const res = await fetch(url);
  return res.json();
}
async function postBet(payload){
  // Apps Script web app handles auth + writes + server-side lock checks. See Code.gs
  return fetch(CONFIG.APPS_SCRIPT_URL, {
    method:'POST', mode:'no-cors', // no-cors: Apps Script doGet/doPost redirect responses aren't readable cross-origin
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
}

async function loadAllData(){
  try{
    const [participants, games, gameBets, generalBets, hof, gameEvents, groupResults] = await Promise.all([
      fetchTab('Participants'), fetchTab('Games'), fetchTab('GameBets'), fetchTab('GeneralBets'), fetchTab('HallOfFame'),
      fetchTab('GameEvents'), fetchTab('GroupResults'),
    ]);
    if(!Array.isArray(participants) || (!participants.length && !games.length)) throw new Error('empty sheet / not configured');
    Object.assign(STATE, { participants, games, gameBets, generalBets, hof, gameEvents, groupResults, demo:false });
  }catch(e){
    if(!CONFIG.DEMO_MODE_FALLBACK) throw e;
    Object.assign(STATE, demoData());
    STATE.demo = true;
  }
  STATE.loaded = true;
}

/* =========================================================
   ============  5. Scoring helpers (client-side, read-only
   display — authoritative calc happens in Apps Script) =====
   ========================================================= */
function computeGameScore(betA, betB, actualA, actualB){
  if(actualA==='' || actualA==null || actualB==='' || actualB==null) return null;
  betA=+betA; betB=+betB; actualA=+actualA; actualB=+actualB;
  let pts = 0;
  const s = CONFIG.SCORING.game;
  const outcome = (a,b) => a>b?'W':a<b?'L':'D';
  if(outcome(betA,betB) === outcome(actualA,actualB)) pts += s.outcome;
  if((betA-betB) === (actualA-actualB)) pts += s.diff;
  if(betA===actualA && betB===actualB) pts += s.exact;
  return pts;
}

function showToast(message, isError){
  let toast = document.getElementById('mdToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'mdToast';
    document.body.appendChild(toast);
  }
  toast.className = 'md-toast' + (isError ? ' error' : '');
  toast.textContent = message;
  toast.style.display = 'flex';
  void toast.offsetWidth; // restart animation if triggered twice in a row
  toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { toast.classList.remove('show'); }, isError ? 4500 : 2600);
}
/** Re-fetches ONE tab a few times, spaced out, since Apps Script can take a
 *  few seconds (cold start) to actually commit a write. Merges the fresh
 *  rows into STATE[stateKey] each time. Returns true as soon as checkFn()
 *  finds the just-saved data, false if it never shows up in time. */
async function pollUntilSaved(tabName, stateKey, checkFn, attempts=5, delayMs=1500){
  for(let i=0; i<attempts; i++){
    await new Promise(r => setTimeout(r, delayMs));
    try{
      const rows = await fetchTab(tabName);
      if(Array.isArray(rows)) STATE[stateKey] = rows;
    }catch(e){ /* transient network hiccup — just try again next loop */ }
    if(checkFn()) return true;
  }
  return false;
}

/** Captures `targetId`'s DOM exactly as rendered and shares/downloads it as
 *  a PNG. Elements marked data-export-exclude (buttons etc.) are omitted. */
async function exportElementImage(targetId, filename, btn){
  const target = document.getElementById(targetId);
  if(!target || !window.html2canvas) return;
  const originalText = btn ? btn.textContent : null;
  if(btn){ btn.textContent = '…'; btn.disabled = true; }
  try{
    const canvas = await html2canvas(target, {
      backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--surface').trim(),
      scale: 2,
      ignoreElements: el => el.hasAttribute && el.hasAttribute('data-export-exclude'),
    });
    canvas.toBlob(async blob => {
      const file = new File([blob], filename, { type:'image/png' });
      if(navigator.canShare && navigator.canShare({ files:[file] })){
        try{ await navigator.share({ files:[file], title:'Matchday' }); if(btn){ btn.textContent = originalText; btn.disabled = false; } return; }catch(e){ /* cancelled/unsupported, fall through to download */ }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      if(btn){ btn.textContent = originalText; btn.disabled = false; }
    });
  }catch(e){ if(btn){ btn.textContent = originalText; btn.disabled = false; } }
}

function wireGeneralForm(){
  if(isGeneralLocked() || !STATE.user) return;
  document.querySelectorAll('.drag-list').forEach(list => {
    let dragEl = null;
    list.querySelectorAll('.drag-item').forEach(item => {
      item.addEventListener('dragstart', () => { dragEl = item; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => { item.classList.remove('dragging'); renumberGroup(list); });
    });
    list.addEventListener('dragover', e => {
      e.preventDefault();
      const after = [...list.querySelectorAll('.drag-item:not(.dragging)')].find(el => e.clientY < el.getBoundingClientRect().top + el.offsetHeight/2);
      if(after) list.insertBefore(dragEl, after); else list.appendChild(dragEl);
    });
  });
  document.getElementById('generalForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const groupsJSON = {};
    document.querySelectorAll('.drag-list').forEach(list => {
      groupsJSON[list.dataset.group] = [...list.querySelectorAll('.drag-item')].map(li => li.dataset.team);
    });
    const payload = {
      type:'generalBet', email: STATE.user.email, name: STATE.user.name,
      rank1: fd.get('rank1'), rank2: fd.get('rank2'), rank3: fd.get('rank3'), rank4: fd.get('rank4'),
      topScorer: fd.get('topScorer'), topAssist: fd.get('topAssist'),
      groupsJSON: JSON.stringify(groupsJSON), timestamp: new Date().toISOString(),
    };

    const saveBtn = e.target.querySelector('button[type="submit"]');
    msg.style.color = 'var(--text-dim)'; msg.textContent = t('saving'); saveBtn.disabled = true;
    await postBet(payload);
    const landed = await pollUntilSaved('GeneralBets', 'generalBets', () =>
      STATE.generalBets.find(b => normEmail(b.email)===normEmail(STATE.user.email) && b.rank1===payload.rank1 && b.topScorer===payload.topScorer)
    );
    saveBtn.disabled = false;

    else{ msg.style.color = 'var(--red)'; msg.textContent = t('saveFailed'); showToast('⚠️ ' + t('saveFailed'), true); renderAll(); }
  });
}

        <option value="${g.teamB}" ${bet && bet.betAdvancing===g.teamB?'selected':''}>${teamName(g.teamB)}</option>

}

/** Aggregates GameEvents by player for one game — only players who actually
 *  have events recorded (not the full rosters), points summed if a player
 *  appears in more than one event row. */
function playedGameMatchEvents(gameId){
  const events = STATE.gameEvents.filter(ev => String(ev.gameId) === String(gameId));
  const byPlayer = {};
  events.forEach(ev => {
    const key = ev.player;
    if(!byPlayer[key]) byPlayer[key] = { player: ev.player, team: ev.team, position: ev.position, events: [] };
    byPlayer[key].events.push(ev);
  });
  return Object.values(byPlayer)
    .map(p => ({ ...p, points: computePlayerGamePoints(p.events) }))
    .sort((a,b) => b.points - a.points);
}
function computePlayerGamePoints(events){
  const sp = CONFIG.SCORING.player;
  let pts = 0;
  events.forEach(ev => {
    const n = +ev.count || 1, pos = ev.position;
    if(ev.eventType === 'goal') pts += (sp.goal[pos]||0) * n;
    else if(ev.eventType === 'assist') pts += (sp.assist[pos]||0) * n;
    else if(ev.eventType === 'ownGoal') pts += sp.ownGoal * n;
    else if(ev.eventType === 'redCard') pts += sp.redCard * n;
    else if(ev.eventType === 'missedPenalty') pts += sp.missedPenalty * n;
    else if(ev.eventType === 'cleanSheet' && pos === 'GK') pts += sp.cleanSheetGK * n;
  });
  return pts;
}
function playerPtsColor(pts){ return pts<=0 ? 'red' : pts<5 ? 'yellow' : 'green'; }
function resolveEventPlayerDisplay(ev){
  const p = findPlayer(ev.player);
  if(p) return { name: playerName(p), team: teamName(p.teamId) };
  return { name: ev.player, team: ev.team ? teamName(ev.team) : '' };
}
function eventBreakdownText(events){
  const labels = { goal:t('evGoal'), assist:t('evAssist'), ownGoal:t('evOwnGoal'), redCard:t('evRedCard'), missedPenalty:t('evMissedPenalty'), cleanSheet:t('evCleanSheet') };
  const counts = {};
  events.forEach(ev => { counts[ev.eventType] = (counts[ev.eventType]||0) + (+ev.count || 1); });
  return Object.entries(counts).map(([k,n]) => `${n>1 ? n+'× ' : ''}${labels[k]||k}`).join(' · ');
}

        <div class="card-title" style="margin-bottom:0;">${t('everyoneBets')}</div>
        <button class="icon-btn" data-export-exclude data-role="exportGameBets" data-target="${exportId}" data-file="matchday-${g.id}.png" style="font-size:11px; padding:5px 8px; display:flex; align-items:center; gap:4px;">📤 ${t('exportImage')}</button>
      </div>
      ${bets.length ? `
      <table class="leaderboard">
        <thead><tr>
          <th>${t('player')}</th><th>${t('yourScore')}</th><th>${t('topPlayerOfGame')}</th>
          ${isKnockout(g) ? `<th>${t('advancingShort')}</th>` : ''}

        <tbody>
          ${bets.map(b => {
            const participant = STATE.participants.find(pp => normEmail(pp.email)===normEmail(b.email));
            const name = participant ? participantName(participant) : (b.name || b.email);
            const pts = (b.pointsEarned!==undefined && b.pointsEarned!=='') ? b.pointsEarned : null;
            const tp = findPlayer(b.betTopPlayer);
            return `<tr>
              <td>${name}</td>
              <td class="mono" style="direction:ltr;">${b.betA ?? '—'}:${b.betB ?? '—'}</td>
              <td>${tp ? playerName(tp) : (b.betTopPlayer || '—')}</td>
              ${isKnockout(g) ? `<td>${b.betAdvancing ? teamName(b.betAdvancing) : '—'}</td>` : ''}
              <td class="points-cell">${pts!==null ? pts : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>` : `<div class="empty-state" style="padding:20px;">${t('noneYet')}</div>`}
    </div>

    <div class="card-title" style="margin-top:16px;">${t('matchEventsTitle')}</div>
    ${matchEvents.length ? matchEvents.map(p => {
      const disp = resolveEventPlayerDisplay(p);

        <div>

          <div style="font-size:11.5px; color:var(--text-dim);">${eventBreakdownText(p.events)}</div>

function wireGamesForm(){
  document.querySelectorAll('[data-role="saveGame"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!STATE.user){ alert(t('emailFirst')); return; }
      const card = btn.closest('.game-card');
      const advSelect = card.querySelector('[data-role="advancing"]');
      const payload = {
        type:'gameBet', email: STATE.user.email, name: STATE.user.name, gameId: btn.dataset.id,
        betA: card.querySelector('[data-role="scoreA"]').value,
        betB: card.querySelector('[data-role="scoreB"]').value,
        betTopPlayer: card.querySelector('[data-role="topPlayer"]').value,
        betAdvancing: advSelect ? advSelect.value : '',
        timestamp: new Date().toISOString(),
      };
      const originalText = btn.textContent;
      btn.textContent = '…'; btn.disabled = true;
      await postBet(payload);
      const landed = await pollUntilSaved('GameBets', 'gameBets', () =>
        STATE.gameBets.find(b => normEmail(b.email)===normEmail(STATE.user.email) && String(b.gameId)===String(payload.gameId)
          && String(b.betA)===String(payload.betA) && String(b.betB)===String(payload.betB))
      );
      if(landed){ showToast('✅ ' + t('saved')); renderAll(); }
      else{ showToast('⚠️ ' + t('saveFailed'), true); btn.textContent = originalText; btn.disabled = false; }
    });
  });
  document.querySelectorAll('[data-role="exportGameBets"]').forEach(btn => {
    btn.addEventListener('click', () => exportElementImage(btn.dataset.target, btn.dataset.file, btn));
  });
}

/* ---- STATS ---- */
function renderStats(){
  return `
  <div class="section-title">${t('statsTitle')}</div>
  <div class="section-sub">${t('statsSub')}</div>
  <div class="card">
    <div class="card-title">${t('pointsOverTime')}</div>
    <canvas id="statsCanvas"></canvas>
    <div class="legend" id="statsLegend"></div>
  </div>
  ${demoBanner()}`;
}
function drawStatsChart(){
  const canvas = document.getElementById('statsCanvas'); if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width*dpr; canvas.height = 280*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const ranked = rankedParticipants();
  const palette = ['#ffb020','#4c9a6a','#5b8fd6','#e2564f','#c9c9c9','#8a611c'];
  // Build a synthetic points-over-time series from each participant's form history (demo/derived).
  const rounds = Math.max(...ranked.map(p => (p.form||[]).length), 1);
  const W = rect.width, H = 280, padL = 30, padB = 20, padT = 10;
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border');
  ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, H-padB); ctx.lineTo(W, H-padB); ctx.stroke();
  ranked.forEach((p,pi) => {
    const form = p.form||[];
    let running = p.totalPoints - form.length*2; // rough back-projection for a demo trend line
    const pts = [running, ...form.map(r => running += (r==='W'?2:r==='D'?1:0))];
    ctx.strokeStyle = palette[pi % palette.length]; ctx.lineWidth = 2; ctx.beginPath();
    pts.forEach((val,i) => {
      const x = padL + (i/(pts.length-1||1)) * (W-padL-6);
      const maxY = Math.max(...ranked.map(q => q.totalPoints), 1);
      const y = (H-padB) - (val/maxY) * (H-padB-padT);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
  document.getElementById('statsLegend').innerHTML = ranked.map((p,pi) =>
    `<div class="legend-item"><span class="legend-swatch" style="background:${palette[pi%palette.length]}"></span>${p.displayName}</div>`).join('');
}

    return `<div class="section-title">${t('hofTitle')}</div><div class="card"><div class="empty-state">${STATE.loaded?'':'<div class="spinner"></div><br>'}${msg}</div></div>`;
  }
  return `
  <div class="section-title">${t('hofTitle')}</div>
  <div class="section-sub">${t('hofSub')}</div>
  <div class="card">
    ${STATE.hof.sort((a,b)=>b.year-a.year).map(h => {
      const winner = h['winnerName_'+LANG] || h.winnerName_en || h.winnerName_he;
      const runnerUp = h['runnerUp_'+LANG] || h.runnerUp_en || h.runnerUp_he;

      return `

        <div class="hof-trophy">🏆</div>
        <div>

/* =========================================================
   ============  7. Auth (Google Sign-In)  ====================
   ========================================================= */
function initGoogleSignIn(){
  if(!window.google || !google.accounts){ setTimeout(initGoogleSignIn, 300); return; }
  google.accounts.id.initialize({
    client_id: '431204508277-nm33th0fs73s81cpn09ngmmalmbvgso1.apps.googleusercontent.com', // see SETUP.md
    callback: handleCredentialResponse,
  });
  renderAuthArea();
}
function handleCredentialResponse(resp){
  const payload = JSON.parse(atob(resp.credential.split('.')[1]));
  STATE.user = { email: payload.email, name: payload.name, picture: payload.picture, idToken: resp.credential };
  localStorage.setItem('md_user', JSON.stringify(STATE.user));
  renderAuthArea(); loadAllData().then(renderAll);
}
function signOut(){ STATE.user = null; localStorage.removeItem('md_user'); renderAuthArea(); loadAllData().then(renderAll); }
function renderAuthArea(){
  const wrap = document.getElementById('gsi-btn-wrap');
  if(STATE.user){
    wrap.innerHTML = `<div class="user-chip"><img src="${STATE.user.picture||''}" onerror="this.style.display='none'"><span class="name">${STATE.user.name}</span><span class="signout" id="signOutBtn" title="${t('signOut')}">⏻</span></div>`;
    document.getElementById('signOutBtn').onclick = signOut;
  } else {
    wrap.innerHTML = '';
    if(window.google && google.accounts) google.accounts.id.renderButton(wrap, { theme:'outline', size:'medium', text:'signin' });
  }
}

document.getElementById('langToggle').onclick = () => {
  LANG = LANG==='en' ? 'he' : 'en';
  localStorage.setItem('md_lang', LANG);
  renderAll();
};
document.getElementById('themeToggle').onclick = () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme')==='light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('md_theme', next);
  document.getElementById('themeToggle').textContent = next==='light' ? '☀️' : '🌙';
};
(function boot(){
  const savedTheme = localStorage.getItem('md_theme') || 'dark';
  if(savedTheme==='light') document.documentElement.setAttribute('data-theme','light');
  document.getElementById('themeToggle').textContent = savedTheme==='light' ? '☀️' : '🌙';
  const savedUser = localStorage.getItem('md_user');
  if(savedUser) STATE.user = JSON.parse(savedUser);
  renderShell();
  document.getElementById('main').innerHTML = `<div class="card"><div class="empty-state"><div class="spinner"></div><br>${t('loading')}</div></div>`;
  initGoogleSignIn();
  loadAllData().then(renderAll);
})();
